<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - Divisor de Gastos</title>
  <link rel="stylesheet" href="../css/theme-dark.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/modals.css">
</head>

<body>

  <div id="logoContainer"></div>
  <script>
   fetch("../components/logo.html")
    .then(res => res.text())
    .then(html => {
      document.getElementById("logoContainer").innerHTML = html;
    });
  </script>

  <!-- Formulario de registro con campos b�sicos y avatar opcional. -->
  <div class="auth-container">
    <h1>Crear Cuenta</h1>

    <form id="registerForm" enctype="multipart/form-data">
      <div class="input-group">
        <label>Nombre</label>
        <input type="text" id="name" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="password" required>
      </div>

      <div class="input-group">
        <label>Avatar (opcional)</label>
        <input type="file" id="avatar" accept="image/*">
      </div>

      <button type="submit" class="btn">Registrarse</button>

      <p class="link">
        ¿Ya tienes cuenta?
        <a href="login.html">Inicia sesión aquí</a>
      </p>
    </form>
  </div>

  <div id="globalModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalMessage"></p>

    <div class="modal-buttons">
      <button id="modalAccept" class="btn">Aceptar</button>
      <button id="modalCancel" class="btn-secondary">Cancelar</button>
    </div>
  </div>
</div>

<!-- Navegaci�n inferior compartida entre vistas principales. -->
<nav class="bottom-nav">
  <button onclick="window.location.href='dashboard.html'">
    <i class="icon">🏠</i>
    <span>Inicio</span>
  </button>

  <button onclick="window.location.href='group-create.html'">
    <i class="icon">➕</i>
    <span>Nuevo</span>
  </button>

  <button onclick="window.location.href='profile.html'">
    <i class="icon">👤</i>
    <span>Perfil</span>
  </button>
</nav>



  <script type="module" src="../js/pages/register.js"></script>
</body>
</html>
