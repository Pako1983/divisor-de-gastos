<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer contraseña - Divisor de Gastos</title>
  <link rel="stylesheet" href="../css/theme-dark.css">
  <link rel="stylesheet" href="../css/auth.css">
  <link rel="stylesheet" href="../css/modals.css">
</head>

<body>
  <div id="logoContainer"></div>
  <script>
    window.APP_CONFIG = window.APP_CONFIG || {
      API_URL: "https://divisor-de-gastos-backend.onrender.com/api",
      FILES_URL: "https://divisor-de-gastos-backend.onrender.com"
    };

    fetch("../components/logo.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("logoContainer").innerHTML = html;
      });
  </script>

  <div class="auth-container">
    <h1>Divisor de Gastos</h1>
    <form id="resetPasswordForm">
      <div class="input-group">
        <label>Nueva contraseña</label>
        <input type="password" id="newPassword" required minlength="6" autocomplete="new-password">
      </div>

      <div class="input-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="confirmPassword" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn">Cambiar contraseña</button>
      <p class="link">
        <a href="login.html">Volver al inicio de sesión</a>
      </p>
    </form>
  </div>

  <div id="globalModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle"></h3>
      <p id="modalMessage"></p>
      <div class="modal-buttons">
        <button id="modalAccept" class="btn">Aceptar</button>
        <button id="modalCancel" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/pages/reset-password.js"></script>
</body>
</html>
