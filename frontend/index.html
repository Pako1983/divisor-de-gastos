<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Divisor de Gastos</title>
</head>

<body>

  <div id="logoContainer"></div>
  <script>
    window.APP_CONFIG = window.APP_CONFIG || {
      API_URL: "https://divisor-de-gastos-backend.onrender.com/api",
      FILES_URL: "https://divisor-de-gastos-backend.onrender.com"
    };

    fetch("components/logo.html")
      .then(res => res.text())
      .then(html => {
        document.getElementById("logoContainer").innerHTML = html;
      });
  </script>

  <p>Redirigiendo...</p>

  <div id="globalModal" class="modal hidden">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <p id="modalMessage"></p>

    <div class="modal-buttons">
      <button id="modalAccept" class="btn">Aceptar</button>
      <button id="modalCancel" class="btn-secondary">Cancelar</button>
    </div>
  </div>
</div>


    <script>
    const params = new URLSearchParams(window.location.search);
    const redirect = params.get("redirect");
    const groupIdParam = params.get("groupId");
    const expenseIdParam = params.get("expenseId");

    const navigateToLogin = () => {
      window.location.href = "src/templates/login.html";
    };

    if (redirect === "group-detail" && groupIdParam) {
      const targetParams = new URLSearchParams({ groupId: groupIdParam });
      if (expenseIdParam) {
        targetParams.set("expenseId", expenseIdParam);
      }
      const redirectPath = `src/templates/group-detail.html?${targetParams.toString()}`;
      localStorage.setItem("pendingRedirect", JSON.stringify({ url: redirectPath }));

      if (localStorage.getItem("token")) {
        window.location.href = redirectPath;
      } else {
        navigateToLogin();
      }
    } else {
      navigateToLogin();
    }
  </script>
</body>
</html>
